<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감사합니다! — 숏폼 복기 시트</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0a0a0f;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 500px;
        }

        .check {
            font-size: 4rem;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
        }

        p {
            color: #9ca3af;
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            border-radius: 12px;
            color: white;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }

        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="check">✅</div>
        <h1>신청 완료!</h1>
        <p>체험 링크를 이메일로 보내드리겠습니다.<br>잠시만 기다려주세요!</p>
        <a href="index.html">← 돌아가기</a>
    </div>
</body>

</html>
